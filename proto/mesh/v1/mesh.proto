syntax = "proto3";

package mesh.v1;

option go_package = "github.com/bernardoforcillo/privatelayer/internal/gen/mesh/v1;meshv1";

service MeshService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc StreamPeers(StreamPeersRequest) returns (stream PeerList);
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
  rpc StreamMap(StreamMapRequest) returns (stream NetworkMap);
  rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);
}

message RegisterRequest {
  string id = 1;
  string public_key = 2;
  string endpoint = 3;
  repeated string allowed_ips = 4;
  string auth_key = 5;
}

message RegisterResponse {
  repeated Peer peers = 1;
}

message HeartbeatRequest {
  string id = 1;
}

message HeartbeatResponse {
  bool success = 1;
}

message StreamPeersRequest {
  string id = 1;
}

message PeerList {
  repeated Peer peers = 1;
}

message DisconnectRequest {
  string id = 1;
}

message DisconnectResponse {
  bool success = 1;
}

message Peer {
  string id = 1;
  string public_key = 2;
  string endpoint = 3;
  repeated string allowed_ips = 4;
  bool online = 5;
  int64 last_seen = 6;
}

message UpdateStatusRequest {
  string node_id = 1;
  bool online = 2;
  string version = 3;
  State state = 4;
}

message UpdateStatusResponse {
  bool success = 1;
  int64 timestamp = 2;
}

message State {
  int64 timestamp = 1;
  SystemInfo system = 2;
  NetworkInfo network = 3;
  WireGuardInfo wireguard = 4;
}

message SystemInfo {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  int64 uptime = 4;
  double cpu_percent = 5;
  double memory_percent = 6;
}

message NetworkInfo {
  string public_ip = 1;
  string nat_type = 2;
  int32 peers_connected = 3;
}

message WireGuardInfo {
  string interface_name = 1;
  int64 rx_bytes = 2;
  int64 tx_bytes = 3;
  int32 handshake_last = 4;
}

message StreamMapRequest {
  string node_id = 1;
  bool incremental = 2;
}

message NetworkMap {
  string node_id = 1;
  repeated Peer peers = 2;
  DERPMap derp_map = 3;
  int64 version = 4;
  int64 timestamp = 5;
}

message DERPMap {
  repeated DERPRegion regions = 1;
}

message DERPRegion {
  int32 region_id = 1;
  string region_code = 2;
  string region_name = 3;
  repeated DERPNode nodes = 4;
}

message DERPNode {
  string name = 1;
  string url = 2;
  bool stun = 3;
}

message GetNodesRequest {
  bool online_only = 1;
}

message GetNodesResponse {
  repeated NodeInfo nodes = 1;
}

message NodeInfo {
  string id = 1;
  string hostname = 2;
  string public_key = 3;
  repeated string ip_addresses = 4;
  bool online = 5;
  int64 last_seen = 6;
  State state = 7;
}
