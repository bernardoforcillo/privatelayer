version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: privatelayer
      POSTGRES_USER: privatelayer
      POSTGRES_PASSWORD: privatelayer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privatelayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  controlplane:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      PL_DATABASE_TYPE: postgres
      PL_DATABASE_DSN: "host=postgres user=privatelayer password=privatelayer dbname=privatelayer sslmode=disable"
      PL_DEV_MODE: "true"
      PL_LOG_FORMAT: text
      PL_BOOTSTRAP_KEY: "change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
